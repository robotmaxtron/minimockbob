# ko build configuration for minimockbob
# https://ko.build/configuration/

# Base image to use for the container
# Using distroless for minimal attack surface and small image size
defaultBaseImage: gcr.io/distroless/static:nonroot

# Build settings
builds:
  - id: minimockbob
    main: ./cmd/minimockbob
    # Go build flags
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w

# OCI image labels (use --image-label flags when building)
# https://github.com/opencontainers/image-spec/blob/main/annotations.md
# Add these labels using ko build command:
#   --image-label org.opencontainers.image.source=https://github.com/robotmaxtron/minimockbob
#   --image-label org.opencontainers.image.description="A sarcastic text generator that transforms strings into alternating capitalization"
#   --image-label org.opencontainers.image.licenses=Apache-2.0
